# ============================================================
# application-dev.properties — Desenvolvimento (H2)
# ============================================================

spring.datasource.url=jdbc:h2:mem:escola_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ─── JWT ─────────────────────────────────────────────────────
app.jwt.secret=escola-dev-secret-key-must-be-at-least-256-bits-long-for-hs256
# Access token: 24 horas em dev (mais prático para testar)
app.jwt.expiration=86400000
# Refresh token: 7 dias
app.jwt.refresh-expiration=604800000

server.port=8080

logging.level.root=INFO
logging.level.com.escola=DEBUG
logging.level.org.springframework.security=DEBUG

# Habilita o agendador (@Scheduled para limpeza de tokens)
spring.task.scheduling.enabled=true
