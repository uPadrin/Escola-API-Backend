# ============================================================
# application.properties — Configuração BASE
#
# Este arquivo apenas define o perfil ativo.
# As configurações reais ficam em:
#   application-dev.properties   (desenvolvimento, H2)
#   application-prod.properties  (produção, PostgreSQL)
#
# Para trocar de perfil:
#   Desenvolvimento (padrão): nenhuma ação necessária
#   Produção: SPRING_PROFILES_ACTIVE=prod
# ============================================================

spring.application.name=school-management-api

# Perfil ativo padrão: dev
# Em produção, sobrescreva via variável de ambiente:
#   SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# ─── SpringDoc / Swagger ─────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
