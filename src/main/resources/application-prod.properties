# ============================================================
# application-prod.properties — Produção (PostgreSQL)
# Variáveis de ambiente obrigatórias:
#   DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET
# ============================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

# ─── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
# Access token: 15 minutos em produção (seguro)
app.jwt.expiration=${JWT_EXPIRATION:900000}
# Refresh token: 7 dias
app.jwt.refresh-expiration=${REFRESH_EXPIRATION:604800000}

server.port=${PORT:8080}

logging.level.root=WARN
logging.level.com.escola=INFO

spring.task.scheduling.enabled=true
